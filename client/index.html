<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spirit</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <main>
    <h1>Spirit</h1>

    <section>
      <h2>Акаунт</h2>
      <button id="btn-generate" type="button">Швидкий чат (ефемерний)</button>
      <button id="btn-create-profile" type="button">Створити профіль</button>
      <div>Ваш ID: <span id="pub-key-display">не згенеровано</span></div>

      <div id="profile-setup" hidden>
        <label>Passphrase профілю: <input id="profile-passphrase" type="password" autocomplete="new-password"></label>
        <button id="btn-profile-confirm" type="button">Створити</button>
        <div id="profile-status"></div>
      </div>

      <div id="backup-step" hidden>
        <h3>Резервна копія ключа</h3>
        <button id="btn-backup-mnemonic" type="button">Показати мнемоніку</button>
        <label>Passphrase keyfile: <input id="keyfile-passphrase" type="password" autocomplete="new-password"></label>
        <button id="btn-backup-keyfile" type="button">Створити keyfile</button>
        <button id="btn-backup-skip" type="button">Пропустити</button>
        <div id="mnemonic-display"></div>
        <div id="keyfile-display"></div>
      </div>

      <div id="backup-reminder" hidden>⚠ Ви не зробили резервну копію ключа — без неї профіль неможливо відновити.</div>
    </section>

    <section>
      <h2>Верифікація</h2>
      <label>Google Client ID: <input id="google-client-id" type="text"></label>
      <button id="btn-google-verify" type="button">Підтвердити через Google</button>
      <div id="google-verify-status"></div>
    </section>

    <section>
      <h2>Інфраструктура</h2>
      <label>Сигнальний вузол: <input id="server-url" type="text" value="http://localhost/spirit/index.php"></label>
      <label>STUN: <input id="stun-url" type="text" value="stun:stun.l.google.com:19302"></label>
      <label>Room ID: <input id="room-id" type="text"></label>
      <label>Invite token: <input id="invite-token" type="text"></label>
    </section>

    <section>
      <h2>З'єднання</h2>
      <button id="btn-initiate" type="button">Ініціювати чат</button>
      <button id="btn-join" type="button">Приєднатися до чату</button>
      <div id="connection-status">не з'єднано</div>
    </section>

    <section>
      <h2>Чат</h2>
      <div id="chat-log"></div>
      <input id="message-input" type="text">
      <button id="btn-send" type="button">Надіслати</button>
    </section>
  </main>

  <script type="module">
    import { initApp } from "./js/app.js";
    initApp(document);
  </script>
</body>
</html>
